name: Daily AI Curation
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run curation
        run: python scripts/curate.py

      - name: Commit results
        run: |
          git config user.name "hermes-bot"
          git config user.email "hermes-bot@users.noreply.github.com"
          git add daily/ README.md || true
          git diff --cached --quiet && exit 0
          git commit -m "chore: daily curation $(date +%Y-%m-%d)"
          git push
